name: Deploy reader (GitHub Pages)

# Builds the client-side reader (apps/web) and publishes it to
# https://logos52.github.io/tsumugu/ on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the workspace packages the reader imports, then the web app.
      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm publish-vault
      - run: pnpm --filter @tsumugu/web build
        env:
          GH_PAGES: "1"
      # Assemble the site: a landing hub at /tsumugu/, the reader at /tsumugu/app/.
      - run: |
          mkdir -p _site/app
          cp -r apps/web/dist/. _site/app/
          cp apps/web/landing/index.html _site/index.html
          cp apps/web/public/logo-glyph.svg _site/logo-glyph.svg
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
