<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo-glyph.svg" />
    <!-- Self-hosted reading face (offline; lazy unicode-range woff2). -->
    <link rel="stylesheet" href="/fonts/lxgw-wenkai-tc.css" />
    <title>Tsumugu — reader</title>
    <!-- Apply the saved theme before paint to avoid a flash. Default = wnac dark. -->
    <script>
      try {
        if (localStorage.getItem("tsg-theme") === "light")
          document.documentElement.dataset.theme = "light";
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header id="app-header">
      <div id="app-brand">
        <img id="app-logo" src="/logo-glyph.svg" alt="" width="30" height="30" />
        <h1>Tsumugu</h1>
      </div>
      <nav id="app-nav">
        <button id="mode-reader" type="button">Read</button>
        <button id="mode-review" type="button">Review</button>
      </nav>
      <div id="app-toolbar"></div>
    </header>
    <main id="app-root"></main>
    <footer id="app-status" aria-live="polite"></footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
